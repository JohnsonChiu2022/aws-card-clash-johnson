<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host · Architecture Clash</title>
<style>
  :root{--bg:#0f1b2d;--panel:#16263d;--panel2:#1d3350;--line:#2c456b;--orange:#ff9900;--orange2:#ec7211;
    --green:#1db954;--red:#e3463a;--txt:#eaf1fb;--muted:#9fb3cd;--gold:#ffd24a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1400px 800px at 50% -10%,#16314f,#0b1626 70%);color:var(--txt);
    font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;min-height:100vh;padding:2.5vh 3vw}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2vh}
  .logo{font-size:clamp(11px,1.2vw,16px);letter-spacing:4px;color:var(--orange);font-weight:700}
  .ttl{font-size:clamp(22px,2.6vw,40px);font-weight:900}
  .ttl span{color:var(--orange)}
  .ctrl{display:flex;gap:10px;align-items:center}
  .btn{padding:12px 22px;border:none;border-radius:12px;font-size:clamp(14px,1.4vw,20px);font-weight:800;cursor:pointer;
    background:linear-gradient(135deg,var(--orange),var(--orange2));color:#1a1100}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
  .btn:disabled{opacity:.4;cursor:default}

  .grid{display:grid;grid-template-columns:1.7fr 1fr;gap:2vw;align-items:start}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:2vh 1.6vw}

  .lobbybox{text-align:center;padding:5vh 2vw}
  .joinurl{font-size:clamp(16px,1.9vw,28px);font-weight:800;color:var(--gold);margin:1.5vh 0;word-break:break-all}
  .qrbox{display:inline-block;background:#fff;padding:14px;border-radius:16px;margin:1vh 0}
  .qrbox img{display:block;width:clamp(180px,22vw,300px);height:clamp(180px,22vw,300px)}
  .hint{color:var(--muted);font-size:clamp(14px,1.4vw,20px);line-height:1.8}
  .count{font-size:clamp(36px,5vw,80px);font-weight:900;color:var(--green)}
  .chips{display:flex;flex-wrap:wrap;gap:.8vw;justify-content:center;margin-top:1.4vh}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:.7vh 1.2vw;font-size:clamp(14px,1.4vw,22px);font-weight:700;animation:pop .3s}
  @keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}

  .qmeta{display:flex;align-items:center;gap:12px;margin-bottom:1.4vh;flex-wrap:wrap}
  .tag{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:5px 14px;font-size:clamp(13px,1.3vw,18px);font-weight:700}
  .tag .v{color:var(--orange)}
  .tag.aws{background:#3a2c08;color:#ffb84d;border-color:#ff9900}
  .tag.gcp{background:#0e2a3f;color:#7cc0ff;border-color:#4285f4}
  .qtitle{font-size:clamp(22px,2.6vw,40px);font-weight:900;margin-bottom:.6vh}
  .qsc{color:var(--muted);font-size:clamp(13px,1.35vw,19px);line-height:1.6;margin-bottom:1.6vh}
  .tbar{height:22px;border-radius:12px;background:#0c1726;border:1px solid var(--line);overflow:hidden;margin-bottom:.6vh}
  .tbar > i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#1db954,#37d36a)}
  .tnum{text-align:right;font-size:clamp(20px,2.4vw,40px);font-weight:900;font-variant-numeric:tabular-nums}

  .row{display:flex;justify-content:center;gap:1vw;flex-wrap:wrap}
  .arrow{text-align:center;color:var(--muted);font-size:clamp(16px,1.8vw,26px);margin:.6vh 0}
  .node{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:1.2vh 1vw;font-size:clamp(13px,1.4vw,20px);font-weight:700;text-align:center;min-width:110px}
  .slot{border:2px dashed var(--orange);border-radius:12px;padding:1.2vh 1vw;min-width:150px;text-align:center;color:var(--orange);font-weight:800;font-size:clamp(13px,1.4vw,20px);
    background:repeating-linear-gradient(45deg,#10233c,#10233c 9px,#14294a 9px,#14294a 18px)}
  .slot .h{display:block;font-size:clamp(11px,1.1vw,15px);color:var(--muted);font-weight:500;margin-top:3px}
  .slot.filled{background:rgba(29,185,84,.16);border:2px solid var(--green);color:#9cf0bf}

  .opts{display:flex;flex-wrap:wrap;gap:1vw;margin-top:1.8vh}
  .opt{background:linear-gradient(160deg,#1a2c46,#142339);border:1px solid var(--line);border-radius:12px;padding:1.1vh 1vw;font-size:clamp(13px,1.3vw,18px);font-weight:700}

  .lbttl{font-size:clamp(16px,1.8vw,26px);font-weight:900;margin-bottom:1.2vh}
  .live{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse 1.4s infinite;vertical-align:middle}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .item{display:flex;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:1vh .8vw;margin-bottom:.9vh;font-size:clamp(15px,1.5vw,24px);font-weight:800}
  .rank{width:2.2ch;color:var(--muted)}
  .nm{flex:1;margin-left:.6vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sc{color:var(--gold);font-variant-numeric:tabular-nums}
  .item.t1{background:linear-gradient(100deg,#3a2c08,#1c2c45);border-color:var(--gold)}
  .item.t1 .rank{color:var(--gold)}
  .item.t2{border-color:#cfd8e6}.item.t3{border-color:#d6a35a}

  .ans{background:var(--panel2);border:1px solid var(--green);border-radius:12px;padding:1vh 1vw;margin-top:1vh;font-size:clamp(13px,1.3vw,18px)}
  .ans b{color:#9cf0bf}
  .endbig{text-align:center;font-size:clamp(30px,4vw,64px);font-weight:900;color:var(--gold);margin:3vh 0}
  a{color:#5fd0ff}
</style>
</head>
<body>
  <header>
    <div><div class="logo">ARCHITECTURE CLASH · HOST CONSOLE</div><div class="ttl">AWS <span>vs</span> GCP</div></div>
    <div class="ctrl">
      <span class="tag"><span class="live"></span>Online <span class="v" id="online">0</span></span>
      <button class="btn" id="startBtn">Start game</button>
      <button class="btn ghost" id="resetBtn">Reset</button>
    </div>
  </header>

  <!-- LOBBY -->
  <div id="lobby" class="panel lobbybox">
    <div class="hint">Scan the QR code on your phone to join:</div>
    <div class="qrbox" id="qrbox" style="display:none"><img id="qrimg" alt="QR code"></div>
    <div class="joinurl" id="joinurl">(set PLAYER_URL in the code to show the join link/QR)</div>
    <div class="count" id="lobbyCount">0</div>
    <div class="hint">players joined · press “Start game” (top-right)</div>
    <div class="chips" id="lobbyNames"></div>
  </div>

  <!-- PLAYING -->
  <div id="play" class="grid" style="display:none">
    <div class="panel">
      <div class="qmeta">
        <span class="tag">Q <span class="v" id="pno">1</span>/<span id="ptot">20</span></span>
        <span class="tag" id="diff">AWS</span>
        <span class="tag" id="phaseTag">Answering</span>
      </div>
      <div class="qtitle" id="qtitle">—</div>
      <div class="qsc" id="qsc">—</div>
      <div class="tbar"><i id="tbar"></i></div>
      <div class="tnum" id="tnum">20</div>
      <div id="board" style="margin-top:1.4vh"></div>
      <div id="revealBox"></div>
    </div>
    <div class="panel">
      <div class="lbttl"><span class="live"></span>Live leaderboard</div>
      <div id="board2"></div>
    </div>
  </div>

  <!-- END -->
  <div id="end" class="panel" style="display:none">
    <div class="endbig">🏆 Final ranking</div>
    <div id="endBoard" style="max-width:760px;margin:0 auto"></div>
  </div>

<script>
/* ====== Use the SAME Apps Script /exec URL as index.html ====== */
const API_URL = "https://script.google.com/macros/s/AKfycbx3kmyikwnjkIivpd3FSdk16Hcd2fvtUdQQnovx0-yYgHLAmM-UC8EV28BZuWFZ50Citw/exec";
/* (optional) the player entry URL — shown as text + QR on the big screen */
const PLAYER_URL = "https://johnsonchiu2022.github.io/aws-card-clash-johnson/";
const REVEAL_SECS = 7;

/* ---------- Question bank (must match index.html) ---------- */
function F(label){return {t:"f",label};}
function S(id,hint){return {t:"s",id,hint};}
const PUZZLES = [
  /* ===================== AWS (1-10) ===================== */
  {id:1,cloud:"AWS",base:800,title:"Decouple & buffer traffic spikes",
   scenario:"A write-heavy API gets sudden traffic spikes. You must buffer incoming requests and let the backend process them asynchronously at its own pace, without losing requests.",
   rows:[[F("API Gateway")],[S("q","Buffering queue")],[S("w","Async worker (serverless)")]],
   answer:{q:"Amazon SQS",w:"AWS Lambda"},
   hand:["Amazon SQS","AWS Lambda","Amazon SNS","Amazon Kinesis Data Streams","Amazon EC2"],
   explain:{q:"SQS buffers and decouples, guaranteeing delivery; SNS is pub/sub, not a buffering queue.",w:"Lambda is triggered by SQS and scales automatically per message."},
   src:["https://docs.aws.amazon.com/lambda/latest/dg/with-sqs.html"]},

  {id:2,cloud:"AWS",base:800,title:"Fan-out an event to many consumers",
   scenario:"One event must notify several independent downstream consumers (multiple queues, email) without them affecting each other.",
   rows:[[F("Publisher (event)")],[S("t","Fan-out topic")],[S("s","One subscribing queue")]],
   answer:{t:"Amazon SNS",s:"Amazon SQS"},
   hand:["Amazon SNS","Amazon SQS","Amazon EventBridge","Amazon Kinesis Data Streams","Amazon S3"],
   explain:{t:"SNS is a pub/sub topic: one message fans out to many subscribers.",s:"Classic fan-out: SNS in front of multiple SQS queues, each consumed independently."},
   src:["https://docs.aws.amazon.com/sns/latest/dg/welcome.html"]},

  {id:3,cloud:"AWS",base:800,title:"Real-time stream with replay + landing",
   scenario:"IoT devices emit huge event volumes. You need real-time, replayable ingestion, plus near-real-time delivery of the raw data into object storage.",
   rows:[[F("IoT devices")],[S("in","Replayable real-time stream")],[S("del","Near-real-time delivery")],[F("Amazon S3")]],
   answer:{in:"Amazon Kinesis Data Streams",del:"Amazon Data Firehose"},
   hand:["Amazon Kinesis Data Streams","Amazon Data Firehose","Amazon SQS","Amazon SNS","AWS Glue"],
   explain:{in:"Kinesis Data Streams handles high-throughput, replayable streams; SQS does not retain a replayable stream.",del:"Data Firehose is fully managed delivery to S3/Redshift in near real time."},
   src:["https://docs.aws.amazon.com/streams/latest/dev/introduction.html","https://docs.aws.amazon.com/firehose/latest/dev/what-is-this-service.html"]},

  {id:4,cloud:"AWS",base:800,title:"HA web tier with DB failover",
   scenario:"Design a resilient web app across two Availability Zones. Compute must scale with load, and the database must fail over automatically with near-zero downtime. Note: a Read Replica is for read scaling, not automatic failover.",
   rows:[[F("Application Load Balancer")],[S("c","Auto-scaling compute")],[S("db","Auto-failover database")]],
   answer:{c:"EC2 Auto Scaling",db:"RDS Multi-AZ"},
   hand:["EC2 Auto Scaling","RDS Multi-AZ","RDS Read Replica","Single EC2 instance","Amazon S3"],
   explain:{c:"Auto Scaling adjusts EC2 capacity across AZs by demand.",db:"RDS Multi-AZ keeps a synchronous standby and auto-fails over; a Read Replica does NOT auto-fail over — the classic trap."},
   src:["https://docs.aws.amazon.com/autoscaling/ec2/userguide/what-is-amazon-ec2-auto-scaling.html","https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Concepts.MultiAZ.html"]},

  {id:5,cloud:"AWS",base:800,title:"Global edge with L7 protection",
   scenario:"A public website must be globally accelerated and protected from layer-7 attacks (SQL injection, XSS). Note: Shield mainly mitigates DDoS, it does not filter malicious app-layer requests.",
   rows:[[F("Users")],[S("cdn","Global CDN")],[S("waf","Layer-7 request filtering")],[F("Application Load Balancer")]],
   answer:{cdn:"Amazon CloudFront",waf:"AWS WAF"},
   hand:["Amazon CloudFront","AWS WAF","AWS Shield","Security Group","Amazon GuardDuty"],
   explain:{cdn:"CloudFront accelerates globally at the edge and can attach WAF.",waf:"WAF filters SQLi/XSS at layer 7; Shield is DDoS, GuardDuty is threat detection."},
   src:["https://docs.aws.amazon.com/waf/latest/developerguide/what-is-aws-waf.html"]},

  {id:6,cloud:"AWS",base:800,title:"Serverless 3-tier web app",
   scenario:"Build a fully serverless app behind API Gateway: end-user sign-in, serverless compute, and a database that auto-scales with traffic. Note: IAM controls AWS account access (not app users); RDS exhausts connections under high Lambda concurrency.",
   rows:[[F("Users")],[S("auth","End-user sign-in")],[F("API Gateway")],[S("fn","Serverless compute")],[S("db","Auto-scaling database")]],
   answer:{auth:"Amazon Cognito",fn:"AWS Lambda",db:"Amazon DynamoDB"},
   hand:["Amazon Cognito","AWS Lambda","Amazon DynamoDB","AWS IAM","Amazon RDS","Amazon EC2"],
   explain:{auth:"Cognito handles app end-user sign-up/sign-in.",fn:"Lambda is the serverless compute tier.",db:"DynamoDB is serverless and auto-scaling — the best fit with Lambda."},
   src:["https://aws.amazon.com/lambda/resources/refarch/refarch-webapp/"]},

  {id:7,cloud:"AWS",base:800,title:"Run containers without managing servers",
   scenario:"Run a containerized service behind an ALB, without provisioning or managing the EC2 host cluster yourself.",
   rows:[[F("Application Load Balancer")],[S("orch","Container orchestration")],[S("compute","Serverless container compute")]],
   answer:{orch:"Amazon ECS",compute:"AWS Fargate"},
   hand:["Amazon ECS","AWS Fargate","Amazon EC2","AWS Lambda","Amazon EKS"],
   explain:{orch:"ECS orchestrates the containers.",compute:"Fargate is serverless container compute — no EC2 hosts to manage; the EC2 launch type means you manage hosts."},
   src:["https://docs.aws.amazon.com/AmazonECS/latest/developerguide/AWS_Fargate.html"]},

  {id:8,cloud:"AWS",base:800,title:"Scale reads on a relational DB",
   scenario:"A read-heavy relational workload overloads the primary database. Reduce read latency with an in-memory cache and offload read traffic to a replica. Note: a Multi-AZ standby is for HA, not read scaling.",
   rows:[[F("Application")],[S("cache","In-memory cache")],[F("Amazon RDS (primary)")],[S("ro","Offload read traffic")]],
   answer:{cache:"Amazon ElastiCache",ro:"RDS Read Replica"},
   hand:["Amazon ElastiCache","RDS Read Replica","RDS Multi-AZ standby","Amazon S3","Amazon CloudFront"],
   explain:{cache:"ElastiCache (Redis/Memcached) serves hot reads from memory.",ro:"Read Replicas scale read throughput; a Multi-AZ standby is for failover (HA), not scaling."},
   src:["https://docs.aws.amazon.com/AmazonElastiCache/latest/dg/WhatIs.html","https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_ReadRepl.html"]},

  {id:9,cloud:"AWS",base:800,title:"Orchestrate a multi-step workflow",
   scenario:"An order must pass through several Lambda steps in sequence, with a visual flow, automatic retries and error handling.",
   rows:[[F("Trigger")],[S("orch","Visual multi-step orchestration")],[F("Multiple AWS Lambda")]],
   answer:{orch:"AWS Step Functions"},
   hand:["AWS Step Functions","Amazon SQS","Amazon SNS","Amazon EventBridge"],
   explain:{orch:"Step Functions orchestrates multi-step state machines with built-in retries/error handling; SQS/SNS only pass messages."},
   src:["https://docs.aws.amazon.com/step-functions/latest/dg/welcome.html"]},

  {id:10,cloud:"AWS",base:800,title:"Ad-hoc SQL on a data lake",
   scenario:"Query data stored in S3 with standard SQL, with no database or cluster to manage. A schema/metadata catalog is required before querying.",
   rows:[[F("Amazon S3 (data lake)")],[S("cat","Schema / metadata catalog")],[S("q","Serverless SQL query")]],
   answer:{cat:"AWS Glue Data Catalog",q:"Amazon Athena"},
   hand:["AWS Glue Data Catalog","Amazon Athena","Amazon Redshift","Amazon RDS","Amazon EMR"],
   explain:{cat:"Glue Data Catalog stores table schema for query engines.",q:"Athena is serverless SQL directly on S3; Redshift requires loading a cluster."},
   src:["https://docs.aws.amazon.com/athena/latest/ug/what-is.html"]},

  /* ===================== GCP (11-20) ===================== */
  {id:11,cloud:"GCP",base:800,title:"Decouple producers from workers",
   scenario:"Ingest a high volume of events and process them asynchronously with a serverless worker, decoupling producers from consumers.",
   rows:[[F("Producer service")],[S("msg","Async messaging")],[S("w","Serverless worker")]],
   answer:{msg:"Pub/Sub",w:"Cloud Functions"},
   hand:["Pub/Sub","Cloud Functions","Cloud Tasks","Memorystore","Compute Engine"],
   explain:{msg:"Pub/Sub is GCP's scalable async messaging for decoupling/streaming; Cloud Tasks is for explicit, rate-controlled task dispatch.",w:"Cloud Functions runs serverless code triggered by Pub/Sub."},
   src:["https://cloud.google.com/pubsub/docs/overview","https://cloud.google.com/functions/docs"]},

  {id:12,cloud:"GCP",base:800,title:"Highly available web tier (GCP)",
   scenario:"Design a resilient web app: a global entry point distributing traffic, compute that scales with load across zones, and a managed relational database with high availability. Note: a read replica is for scaling, not HA failover.",
   rows:[[F("Users")],[S("lb","Global L7 load balancing")],[S("c","Auto-scaling compute")],[S("db","HA managed SQL database")]],
   answer:{lb:"Cloud Load Balancing",c:"Managed Instance Group",db:"Cloud SQL (HA)"},
   hand:["Cloud Load Balancing","Managed Instance Group","Cloud SQL (HA)","Single Compute Engine VM","Cloud SQL read replica"],
   explain:{lb:"Global external Application Load Balancer fronts the app on one anycast IP.",c:"A Managed Instance Group autoscales VMs across zones.",db:"Cloud SQL HA uses a regional standby with automatic failover; a read replica only scales reads."},
   src:["https://cloud.google.com/load-balancing/docs/load-balancing-overview","https://cloud.google.com/compute/docs/autoscaler","https://cloud.google.com/sql/docs/mysql/high-availability"]},

  {id:13,cloud:"GCP",base:800,title:"Streaming analytics pipeline (GCP)",
   scenario:"Ingest streaming events, transform them in-flight, and load them into a serverless data warehouse for SQL analytics.",
   rows:[[F("Event sources")],[S("ingest","Streaming ingestion")],[S("etl","Stream processing / ETL")],[S("dw","Serverless data warehouse")]],
   answer:{ingest:"Pub/Sub",etl:"Dataflow",dw:"BigQuery"},
   hand:["Pub/Sub","Dataflow","BigQuery","Cloud Bigtable","Cloud Storage"],
   explain:{ingest:"Pub/Sub ingests the event stream.",etl:"Dataflow does unified stream/batch processing.",dw:"BigQuery is the serverless SQL data warehouse for analytics."},
   src:["https://cloud.google.com/pubsub/docs/overview","https://cloud.google.com/dataflow/docs/overview","https://cloud.google.com/bigquery/docs/introduction"]},

  {id:14,cloud:"GCP",base:800,title:"Serverless SQL over a data lake (GCP)",
   scenario:"Store large raw data and run standard SQL analytics over it with no cluster to manage. Pick the object storage layer and the serverless warehouse — not a self-managed cluster.",
   rows:[[F("Raw data")],[S("store","Object storage data lake")],[S("q","Serverless SQL warehouse")]],
   answer:{store:"Cloud Storage",q:"BigQuery"},
   hand:["Cloud Storage","BigQuery","Dataproc cluster","Cloud SQL","Filestore"],
   explain:{store:"Cloud Storage is the object data lake.",q:"BigQuery is serverless SQL analytics; Dataproc is a managed Hadoop/Spark cluster you must size."},
   src:["https://cloud.google.com/storage/docs/introduction","https://cloud.google.com/bigquery/docs/introduction"]},

  {id:15,cloud:"GCP",base:800,title:"Massive low-latency NoSQL (GCP)",
   scenario:"Store time-series / IoT data with millions of writes per second and single-digit-millisecond reads at huge scale (wide-column). Choose the right database, not a document or relational store.",
   rows:[[F("High-throughput writes")],[S("db","Wide-column NoSQL at scale")]],
   answer:{db:"Cloud Bigtable"},
   hand:["Cloud Bigtable","Firestore","Cloud SQL","BigQuery"],
   explain:{db:"Bigtable is wide-column, high-throughput, low-latency at massive scale; Firestore is document, Cloud SQL is relational, BigQuery is analytics."},
   src:["https://cloud.google.com/bigtable/docs/overview"]},

  {id:16,cloud:"GCP",base:800,title:"Serverless web app (GCP)",
   scenario:"Build a serverless app: end-user authentication, request-driven serverless container compute, and a serverless document database. Note: Cloud IAM is for account-level permissions, not app end-users.",
   rows:[[F("Users")],[S("auth","End-user authentication")],[S("compute","Serverless container compute")],[S("db","Serverless document DB")]],
   answer:{auth:"Identity Platform",compute:"Cloud Run",db:"Firestore"},
   hand:["Identity Platform","Cloud Run","Firestore","Cloud IAM","Cloud SQL","Compute Engine"],
   explain:{auth:"Identity Platform handles app end-user auth (incl. social logins).",compute:"Cloud Run runs serverless containers on demand.",db:"Firestore is the serverless document database."},
   src:["https://cloud.google.com/identity-platform/docs","https://cloud.google.com/run/docs/overview/what-is-cloud-run","https://cloud.google.com/firestore/docs/overview"]},

  {id:17,cloud:"GCP",base:800,title:"Managed Kubernetes without node ops",
   scenario:"You need full Kubernetes capabilities but don't want to manage nodes, scaling or node security yourself. Pick the platform and the right mode of operation.",
   rows:[[F("Global load balancer")],[S("orch","Managed Kubernetes")],[S("mode","Hands-off node management")]],
   answer:{orch:"Google Kubernetes Engine (GKE)",mode:"GKE Autopilot"},
   hand:["Google Kubernetes Engine (GKE)","GKE Autopilot","Compute Engine","Cloud Run","GKE Standard"],
   explain:{orch:"GKE is managed Kubernetes; Cloud Run is not full Kubernetes.",mode:"Autopilot manages nodes/scaling/security for you; Standard mode means you manage the nodes."},
   src:["https://cloud.google.com/kubernetes-engine/docs/concepts/autopilot-overview"]},

  {id:18,cloud:"GCP",base:800,title:"Scale reads on Cloud SQL",
   scenario:"A read-heavy relational workload overloads Cloud SQL. Add an in-memory cache and offload reads to a replica. Note: an HA standby is for failover, not read scaling.",
   rows:[[F("Application")],[S("cache","In-memory cache")],[F("Cloud SQL (primary)")],[S("ro","Offload read traffic")]],
   answer:{cache:"Memorystore",ro:"Cloud SQL read replica"},
   hand:["Memorystore","Cloud SQL read replica","Cloud SQL HA standby","Cloud Storage","Cloud CDN"],
   explain:{cache:"Memorystore (Redis) serves hot reads from memory.",ro:"Read replicas scale reads; the HA standby is for failover, not scaling."},
   src:["https://cloud.google.com/memorystore/docs/redis/memorystore-for-redis-overview","https://cloud.google.com/sql/docs/mysql/replication"]},

  {id:19,cloud:"GCP",base:800,title:"Serverless workflow orchestration (GCP)",
   scenario:"Coordinate multiple Cloud Run services / APIs in a defined sequence with retries and error handling, fully serverless. Note: Cloud Composer (Airflow) is heavier, aimed at complex data pipelines.",
   rows:[[F("Trigger")],[S("orch","Serverless step orchestration")],[F("Cloud Run / APIs")]],
   answer:{orch:"Workflows"},
   hand:["Workflows","Cloud Composer","Pub/Sub","Cloud Tasks"],
   explain:{orch:"Workflows is serverless orchestration of services/APIs in a defined order, with retries; Composer is managed Airflow for heavier pipelines."},
   src:["https://cloud.google.com/workflows/docs/overview"]},

  {id:20,cloud:"GCP",base:800,title:"Global static content delivery (GCP)",
   scenario:"Serve a global static website / assets with edge caching and low latency.",
   rows:[[F("Users")],[S("cdn","Edge cache / CDN")],[S("store","Static object storage")]],
   answer:{cdn:"Cloud CDN",store:"Cloud Storage"},
   hand:["Cloud CDN","Cloud Storage","Persistent Disk","Filestore","Memorystore"],
   explain:{cdn:"Cloud CDN caches content at Google's edge PoPs.",store:"Cloud Storage holds the static objects served via the load balancer + Cloud CDN."},
   src:["https://cloud.google.com/cdn/docs/overview","https://cloud.google.com/storage/docs/introduction"]},
];
function slotCount(p){return Object.keys(p.answer).length;}
function roundSecs(p){return 20+(slotCount(p)-1)*5;}

const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
let running=false, rafId=0;

$('#ptot').textContent=PUZZLES.length;
if(PLAYER_URL){
  $('#joinurl').textContent=PLAYER_URL;
  $('#qrimg').src='https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=0&data='+encodeURIComponent(PLAYER_URL);
  $('#qrbox').style.display='inline-block';
}

$('#startBtn').onclick=async()=>{
  if(running)return; running=true; $('#startBtn').disabled=true;
  for(let r=0;r<PUZZLES.length;r++){
    const secs=roundSecs(PUZZLES[r]);
    await call('setstate',{phase:'question',round:r,duration:secs,key:'HOST'});
    renderQuestion(r,secs);
    await sleep(secs*1000);
    await call('setstate',{phase:'reveal',round:r,duration:secs,key:'HOST'});
    renderReveal(r);
    await sleep(REVEAL_SECS*1000);
  }
  await call('setstate',{phase:'ended',round:PUZZLES.length-1,duration:0,key:'HOST'});
  renderEnd();
  running=false; $('#startBtn').disabled=false; $('#startBtn').textContent='Restart';
};
$('#resetBtn').onclick=async()=>{
  if(!confirm('Clear all scores and return to the lobby?'))return;
  await call('reset',{key:'GO'});
  location.reload();
};

function showView(v){['lobby','play','end'].forEach(x=>$('#'+x).style.display=(x===v?(v==='play'?'grid':'block'):'none'));}

function renderQuestion(r,secs){
  showView('play');
  const p=PUZZLES[r];
  $('#pno').textContent=p.id;
  const dtag=$('#diff'); dtag.textContent=p.cloud; dtag.className='tag '+(p.cloud==='AWS'?'aws':'gcp');
  $('#phaseTag').textContent='Answering';
  $('#qtitle').textContent=p.title;
  $('#qsc').textContent=p.scenario;
  $('#revealBox').innerHTML='';
  drawBoard(r,false);
  cancelAnimationFrame(rafId);
  const t0=Date.now(), dur=secs*1000;
  (function loop(){
    let left=dur-(Date.now()-t0); if(left<0)left=0;
    const f=left/dur;
    $('#tbar').style.width=(f*100)+'%';
    $('#tbar').style.background=f>.5?'linear-gradient(90deg,#1db954,#37d36a)':f>.25?'linear-gradient(90deg,#ff9900,#ffb84d)':'linear-gradient(90deg,#e3463a,#ff6a5e)';
    $('#tnum').textContent=Math.ceil(left/1000);
    if(left>0)rafId=requestAnimationFrame(loop);
  })();
}

function drawBoard(r,reveal){
  const p=PUZZLES[r], b=$('#board'); b.innerHTML='';
  p.rows.forEach((row,ri)=>{
    if(ri>0){const a=document.createElement('div');a.className='arrow';a.textContent='↓';b.appendChild(a);}
    const rr=document.createElement('div');rr.className='row';
    row.forEach(cell=>{
      const el=document.createElement('div');
      if(cell.t==='f'){el.className='node';el.textContent=cell.label;}
      else if(reveal){el.className='slot filled';el.innerHTML='✓ '+esc(p.answer[cell.id]);}
      else{el.className='slot';el.innerHTML='?'+(cell.hint?('<span class="h">'+cell.hint+'</span>'):'');}
      rr.appendChild(el);
    });
    b.appendChild(rr);
  });
  if(!reveal){
    const o=document.createElement('div');o.className='opts';
    shuffle(p.hand.slice()).forEach(n=>{const c=document.createElement('div');c.className='opt';c.textContent=n;o.appendChild(c);});
    b.appendChild(o);
  }
}

function renderReveal(r){
  const p=PUZZLES[r];
  $('#phaseTag').textContent='Answer revealed';
  $('#tnum').textContent='✓';
  $('#tbar').style.width='100%';$('#tbar').style.background='linear-gradient(90deg,#1db954,#37d36a)';
  drawBoard(r,true);
  let html='';
  Object.keys(p.answer).forEach(k=>{html+='<div class="ans"><b>✓ '+esc(p.answer[k])+'</b> — '+esc(p.explain[k]||'')+'</div>';});
  html+='<div class="ans" style="border-color:var(--line)">Docs: '+p.src.map(u=>'<a href="'+u+'" target="_blank" rel="noopener">'+esc(u)+'</a>').join('<br>')+'</div>';
  $('#revealBox').innerHTML=html;
}

function renderEnd(){
  showView('end');
  call('top',{},rows=>{
    rows=rows||[];rows.sort((a,b)=>b.score-a.score);
    $('#endBoard').innerHTML=rows.slice(0,10).map((r,i)=>itemHTML(r,i)).join('')||'<div class="hint">No scores</div>';
  });
}

function itemHTML(r,i){
  const cls=i<3?('t'+(i+1)):'';
  const md=['🥇','🥈','🥉'][i]||'';
  return '<div class="item '+cls+'"><div class="rank">'+(i+1)+'</div><div class="nm">'+md+' '+esc(r.name)+'</div><div class="sc">'+r.score+'</div></div>';
}
function updateBoard(){
  call('top',{},rows=>{
    rows=rows||[];rows.sort((a,b)=>b.score-a.score);
    $('#online').textContent=rows.length;
    $('#lobbyCount').textContent=rows.length;
    $('#lobbyNames').innerHTML=rows.map(r=>'<span class="chip">'+esc(r.name)+'</span>').join('');
    $('#board2').innerHTML=rows.slice(0,10).map((r,i)=>itemHTML(r,i)).join('')||'<div class="hint">Waiting for players…</div>';
  });
}
setInterval(updateBoard,2000); updateBoard();

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function call(action,params,cb){
  return new Promise(res=>{
    if(API_URL.indexOf('PASTE_')===0){ if(action==='top')cb&&cb([]); res({ok:true}); return; }
    let url=API_URL+'?action='+action;
    for(const k in params)url+='&'+k+'='+encodeURIComponent(params[k]);
    const name='cb_'+Date.now()+Math.floor(Math.random()*99999);
    window[name]=d=>{try{cb&&cb(d);res(d);}finally{delete window[name];s.remove();}};
    const s=document.createElement('script');
    s.src=url+'&callback='+name+'&_='+Date.now();
    s.onerror=()=>{cb&&cb(null);res(null);delete window[name];s.remove();};
    document.body.appendChild(s);
  });
}
</script>
</body>
</html>
